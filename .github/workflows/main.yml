# Build GamePad_Macro_Demo.wps (devkitPro) + GamePadMacroEditor.exe (PyInstaller),
# upload CI artifacts on every run, and attach both to a GitHub Release on tag v*.

name: Build and release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Use Node 24–compatible action runtimes (see GitHub Actions Node 20 deprecation).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-wps:
    name: WUPS plugin (.wps)
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Wii-U-Pad-Macro
        uses: actions/checkout@v5
        with:
          path: Wii-U-Pad-Macro

      - name: Checkout Wii-U-Time-Sync (Makefile sibling)
        uses: actions/checkout@v5
        with:
          repository: Nightkingale/Wii-U-Time-Sync
          ref: master
          path: Wii-U-Time-Sync
          submodules: recursive

      - name: Build
        working-directory: Wii-U-Pad-Macro
        env:
          DEVKITPRO: /opt/devkitpro
        run: |
          set -euo pipefail
          make -j"$(nproc)"
          test -f GamePad_Macro_Demo.wps
          ls -la GamePad_Macro_Demo.wps

      - name: Stage .wps for artifact
        run: cp Wii-U-Pad-Macro/GamePad_Macro_Demo.wps ./GamePad_Macro_Demo.wps

      - name: Upload .wps artifact
        uses: actions/upload-artifact@v6
        with:
          name: GamePad_Macro_Demo-wps
          path: GamePad_Macro_Demo.wps

  build-pc:
    name: PC editor (Windows .exe)
    # Pin image before windows-latest redirects to windows-2025-vs2026 (Jun 2026).
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build one-file exe + sd sample tree
        working-directory: PC_Edieted
        shell: pwsh
        env:
          TCL_LIBRARY: ""
          TK_LIBRARY: ""
        run: |
          $ErrorActionPreference = "Stop"
          python -m pip install -U pip
          python -m pip install "pyinstaller>=6.0"
          python -m PyInstaller --noconfirm --clean --windowed --onefile `
            --name GamePadMacroEditor --collect-all tkinter editor.py
          New-Item -ItemType Directory -Force -Path dist/sd/wiiu/gamepad_macro | Out-Null
          Copy-Item -Path ../sd/wiiu/gamepad_macro/* -Destination dist/sd/wiiu/gamepad_macro/ -Recurse -Force

      - name: Zip PC bundle (exe + sd/)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Compress-Archive -Force `
            -Path PC_Edieted/dist/GamePadMacroEditor.exe, PC_Edieted/dist/sd `
            -DestinationPath GamePadMacroEditor-windows.zip

      - name: Upload PC zip artifact
        uses: actions/upload-artifact@v6
        with:
          name: GamePadMacroEditor-windows-zip
          path: GamePadMacroEditor-windows.zip

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-wps, build-pc]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download .wps
        uses: actions/download-artifact@v8
        with:
          name: GamePad_Macro_Demo-wps
          path: release

      - name: Download PC zip
        uses: actions/download-artifact@v8
        with:
          name: GamePadMacroEditor-windows-zip
          path: release

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/GamePad_Macro_Demo.wps
            release/GamePadMacroEditor-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
